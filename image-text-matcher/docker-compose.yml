x-app-environment: &app-environment
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/image_text_matcher}
  MATCH_THRESHOLD: ${MATCH_THRESHOLD:-85}
  PROCESSING_ENABLED_DEFAULT: ${PROCESSING_ENABLED_DEFAULT:-true}
  QUEUE_POLL_INTERVAL_SECONDS: ${QUEUE_POLL_INTERVAL_SECONDS:-2}
  PROCESSING_TIMEOUT_SECONDS: ${PROCESSING_TIMEOUT_SECONDS:-600}
  PROCESSED_IMAGE_DIR: ${PROCESSED_IMAGE_DIR:-/data/processed}
  IMAGE_BASE_DIR: ${IMAGE_BASE_DIR:-/data/images}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-testadmin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-testadmin}
  API_KEY: ${API_KEY:-}
  SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me}

x-app-volumes: &app-volumes
  - ./data/images:/data/images
  - ./data/processed:/data/processed
  - paddleocr_cache:/root/.paddleocr

services:
  migrate:
    build: .
    command: alembic upgrade head
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build: .
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes: *app-volumes

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-image_text_matcher}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-image_text_matcher}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  paddleocr_cache:
